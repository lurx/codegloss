name: Integration tests

# Sentinel pattern — see unit.yml. Branch protection should require
# `integration-required` instead of individual example names.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run:
              - 'packages/codegloss/**'
              - 'examples/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/integration.yml'
              - '.github/actions/setup/**'

  example:
    name: ${{ matrix.example }}
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - vanilla-html
          - plain-markdown
          - react-18
          - react-19
          - nextjs-app
          - nextjs-static
          - velite
          - docusaurus
          - astro-starlight
          - vitepress
          - sveltekit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run example build + assertions
        run: pnpm --filter @codegloss-examples/${{ matrix.example }} test

  integration-required:
    name: integration-required
    needs: [changes, example]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert heavy job passed or was correctly skipped
        env:
          RESULT: ${{ needs.example.result }}
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            exit 1
          fi
          echo "ok: example result=$RESULT"
