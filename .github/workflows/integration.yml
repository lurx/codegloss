name: Integration tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/codegloss/**'
      - 'examples/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'packages/codegloss/**'
      - 'examples/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/integration.yml'

permissions:
  contents: read

jobs:
  example:
    name: ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - vanilla-html
          - plain-markdown
          - react-18
          - react-19
          - nextjs-app
          - nextjs-static
          - velite
          - docusaurus
          - astro-starlight
          - vitepress
          - sveltekit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local packages
        run: pnpm -w run build:packages

      - name: Run example build + assertions
        run: pnpm --filter @codegloss-examples/${{ matrix.example }} test
