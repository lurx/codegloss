name: Publish

# Single workflow for both publish flows because npm's trusted publisher
# config allows only one workflow per package. Each trigger runs exactly
# one of the two jobs below.
#
# - push → main           → Changesets opens/updates a Version Packages PR;
#                           merging that PR re-triggers this workflow and
#                           publishes to npm under the default `latest` tag.
# - PR with `snapshot` label → publishes every package under a branch-
#                           derived dist-tag (snapshot), so reviewers can
#                           install a PR straight from npm without it
#                           touching main. Triggered both when the label
#                           is first applied AND on every subsequent push
#                           to the labeled PR (synchronize), so a rebase
#                           or fixup automatically refreshes the snapshot.
# - workflow_dispatch     → manual escape hatch for snapshot publishes on
#                           refs that aren't tied to an open PR.
#
# Auth via npm Trusted Publishing (OIDC); no NPM_TOKEN secret. Publishes
# request provenance via `NPM_CONFIG_PROVENANCE=true` / `--provenance`
# so the resulting tarballs carry signed attestations.

on:
  push:
    branches: [main]
  pull_request:
    # `synchronize` so a force-push or new commit to a labeled PR refreshes
    # the snapshot without the reviewer having to re-toggle the label.
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or any ref to publish a snapshot from
        required: true
        type: string

# Permissions are scoped per job (S8233): workflow-level write would
# also grant `smoke-test` and `snapshot` permissions they don't need.

jobs:
  release:
    name: Release (main)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Same environment as `snapshot` so a single npm trusted-publisher
    # entry (workflow: publish.yml, environment: npm-publishing) covers
    # both flows. npm only allows one trusted publisher per package, so
    # we can't split release vs snapshot into separate publisher entries.
    environment: npm-publishing
    concurrency: release-${{ github.ref }}
    permissions:
      contents: write # changesets/action opens/updates the Version Packages PR
      pull-requests: write # same
      id-token: write # OIDC exchange with npm for trusted publishing + provenance
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Persist the PAT into .git/config so the git push that
          # changesets/action runs (to update changeset-release/main) is
          # authenticated as a real user, not github-actions[bot]. That's
          # what lets the resulting pull_request synchronize event cascade
          # into the required CI workflows on the Version Packages PR.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

  smoke-test:
    name: Smoke-test published tarballs
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions: {} # installs from public npm; no GITHUB_TOKEN scopes needed
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release.outputs.publishedPackages) }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install and resolve from npm
        env:
          NAME: ${{ matrix.package.name }}
          VERSION: ${{ matrix.package.version }}
        run: |
          set -euo pipefail
          mkdir smoke && cd smoke
          npm init -y >/dev/null
          # Retry a few times — npm's registry can lag a minute behind publish.
          for attempt in 1 2 3 4 5; do
            if npm install --no-audit --no-fund "$NAME@$VERSION"; then
              break
            fi
            echo "attempt $attempt failed, waiting 15s..."
            sleep 15
          done
          node -e "const p = require('$NAME/package.json'); if (p.version !== '$VERSION') { console.error('version mismatch', p.version, 'vs', '$VERSION'); process.exit(1) }; console.log('ok:', p.name, p.version)"

  snapshot:
    name: PR snapshot
    # `contains(...labels.*.name, 'snapshot')` works for both `labeled`
    # (the just-added label is included in the labels array) and
    # `synchronize` (no `event.label`, but the PR's current label set is
    # still on `event.pull_request.labels`). On unlabeled PRs the job is
    # skipped at the if-gate, so synchronize doesn't publish for everyone.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'snapshot'))
    runs-on: ubuntu-latest
    # Same environment as the release job — npm only allows one
    # trusted publisher per package, and PR-event OIDC tokens aren't
    # accepted unless the publish is scoped to an environment that
    # the trusted publisher specifies. Scoping both jobs to
    # `npm-publishing` means a single trusted-publisher entry
    # (workflow: publish.yml, environment: npm-publishing) authorizes
    # both. Tighten with deployment-branch rules or required reviewers
    # in repo Settings if you want to gate which PRs can publish
    # snapshots.
    environment: npm-publishing
    concurrency:
      group: snapshot-${{ github.event.pull_request.head.ref || inputs.ref }}
      # A rapid burst of pushes shouldn't queue up redundant publishes —
      # only the latest commit should land on the snapshot tag.
      cancel-in-progress: true
    permissions:
      contents: read # checkout
      id-token: write # OIDC exchange with npm for trusted publishing + provenance
    steps:
      - name: Resolve target ref
        id: resolve
        env:
          DISPATCH_REF: ${{ inputs.ref }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            ref="$DISPATCH_REF"
          else
            ref="$PR_REF"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      - name: Derive snapshot tag from ref
        id: tag
        env:
          REF: ${{ steps.resolve.outputs.ref }}
        run: |
          t=$(echo "$REF" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "tag=$t" >> "$GITHUB_OUTPUT"

      - name: Version packages as snapshot
        run: pnpm changeset version --snapshot ${{ steps.tag.outputs.tag }}

      - name: Publish to npm under the snapshot tag
        # --no-git-checks lets pnpm publish from a dirty tree (changeset
        # version --snapshot has just modified the package.json versions).
        # Not to be confused with npm's --no-git-tag-version, which is a
        # different flag for a different command.
        # --provenance attaches a signed attestation via OIDC (id-token:
        # write is set above).
        run: pnpm -r publish --no-git-checks --provenance --tag ${{ steps.tag.outputs.tag }}
