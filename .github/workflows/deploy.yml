name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/codegloss/**'
      - 'apps/site/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy.yml'
      - '.github/actions/setup/**'
  workflow_dispatch:

# Permissions are scoped per job (S8233/S8264): the build job only
# needs to checkout + enable Pages, the deploy job needs OIDC + pages.

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      pages: write # configure-pages with enablement: true creates the Pages site
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build site
        env:
          PAGES_BASE_PATH: /codegloss
        run: pnpm -w run build:site

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site on first run so the repo doesn't need
          # a manual Settings → Pages toggle before this workflow can succeed.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy-pages
      id-token: write # OIDC for the Pages deployment attestation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
