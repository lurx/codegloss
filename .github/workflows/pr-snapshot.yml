name: Publish PR snapshot

# Manual-dispatch-only. Publishes every workspace package under a
# branch-derived npm dist-tag so reviewers can install a PR without it
# touching main. See PRE-RELEASE.md for the full workflow.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or any ref to publish from
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local packages
        run: pnpm -w run build:packages

      - name: Derive snapshot tag from ref
        id: tag
        run: |
          t=$(echo "${{ inputs.ref }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "tag=$t" >> "$GITHUB_OUTPUT"

      - name: Version packages as snapshot
        run: pnpm changeset version --snapshot ${{ steps.tag.outputs.tag }}

      - name: Publish to npm under the snapshot tag
        run: pnpm -r publish --no-git-tag-version --tag ${{ steps.tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
