name: E2E tests

# Sentinel pattern — see unit.yml for the rationale. Branch protection
# should require `e2e-required` (not the individual matrix browser
# names), so path-filtered skips don't deadlock PRs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run:
              - 'packages/codegloss/**'
              - 'test/e2e/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/e2e.yml'
              - '.github/actions/setup/**'

  playwright-version:
    name: Resolve Playwright version
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: |
          v=$(node -p "require('./test/e2e/package.json').devDependencies['@playwright/test']")
          echo "version=$v" >> "$GITHUB_OUTPUT"

  e2e:
    name: e2e / ${{ matrix.browser }}
    needs: [changes, playwright-version]
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.playwright-version.outputs.version }}-noble
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run E2E tests
        run: pnpm --filter @codegloss/e2e test --project=${{ matrix.browser }}

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test/e2e/test-results/
          retention-days: 7

  e2e-required:
    name: e2e-required
    needs: [changes, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert heavy job passed or was correctly skipped
        env:
          RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            exit 1
          fi
          echo "ok: e2e result=$RESULT"
