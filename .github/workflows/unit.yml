name: Unit tests

# Sentinel pattern: `changes` decides whether the heavy `test` job runs,
# and `required` always reports a status so branch protection can require
# it without deadlocking on PRs that don't touch the filtered paths.
# Wire branch protection to `Unit tests / required`.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run:
              - 'packages/codegloss/**'
              - 'packages/shiki/**'
              - 'apps/site/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/unit.yml'

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local packages
        run: pnpm -w run build:packages

      - name: Run unit tests with coverage
        run: pnpm -w run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/codegloss/coverage/lcov.info,packages/shiki/coverage/lcov.info,apps/site/coverage/lcov.info
          fail_ci_if_error: false

  required:
    name: required
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert heavy job passed or was correctly skipped
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            exit 1
          fi
          echo "ok: test result=$RESULT"
