name: Unit tests

# Sentinel pattern: `changes` decides whether the heavy `test` job runs,
# and `unit-required` always reports a status so branch protection can
# require it without deadlocking on PRs that don't touch the filtered
# paths. Wire branch protection to `unit-required`.
#
# Sonar runs as a downstream job that consumes the coverage artifact
# from `test`, so we don't rebuild + re-run tests in a second workflow.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: unit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run:
              - 'packages/codegloss/**'
              - 'packages/shiki/**'
              - 'apps/site/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/unit.yml'
              - '.github/actions/setup/**'

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests with coverage
        run: pnpm -w run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/codegloss/coverage/lcov.info,packages/shiki/coverage/lcov.info,apps/site/coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload coverage artifact for Sonar
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            packages/codegloss/coverage/lcov.info
            packages/shiki/coverage/lcov.info
            apps/site/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  sonar:
    name: sonar
    needs: test
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so Sonar can attribute changes to commits.
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          # Preserves the packages/*/coverage/lcov.info tree the artifact
          # was uploaded with, which is what sonar-project.properties points at.
          path: .

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Sentinel job names are unique across workflows because branch
  # protection matches against the literal check_run name, not the
  # workflow-prefixed display label the GitHub UI shows.
  unit-required:
    name: unit-required
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert heavy job passed or was correctly skipped
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            exit 1
          fi
          echo "ok: test result=$RESULT"
