name: E2E site tests

# Sentinel pattern — see unit.yml. Branch protection should require
# `e2e-site-required`.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run:
              - 'packages/codegloss/**'
              - 'apps/site/**'
              - 'test/e2e-site/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/e2e-site.yml'

  playwright-version:
    name: Resolve Playwright version
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: |
          v=$(node -p "require('./test/e2e-site/package.json').devDependencies['@playwright/test']")
          echo "version=$v" >> "$GITHUB_OUTPUT"

  e2e-site:
    name: e2e-site / ${{ matrix.browser }}
    needs: [changes, playwright-version]
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.playwright-version.outputs.version }}-noble
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local packages
        run: pnpm -w run build:packages

      - name: Run E2E site tests
        run: pnpm --filter @codegloss/e2e-site test --project=${{ matrix.browser }}

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-site-traces-${{ matrix.browser }}
          path: test/e2e-site/test-results/
          retention-days: 7

  e2e-site-required:
    name: e2e-site-required
    needs: [changes, e2e-site]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert heavy job passed or was correctly skipped
        env:
          RESULT: ${{ needs.e2e-site.result }}
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            exit 1
          fi
          echo "ok: e2e-site result=$RESULT"
