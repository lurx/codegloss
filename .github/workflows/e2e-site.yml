name: E2E site tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e-site:
    name: e2e-site / ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local packages
        run: pnpm -w run build:packages

      - name: Install Playwright browser
        run: pnpm --filter @codegloss/e2e-site exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E site tests
        run: pnpm --filter @codegloss/e2e-site test --project=${{ matrix.browser }}

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-site-traces-${{ matrix.browser }}
          path: test/e2e-site/test-results/
          retention-days: 7
