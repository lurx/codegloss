<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>codegloss e2e · theme overrides</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* Page-level overrides for the codegloss CSS custom properties.
         These should propagate into the shadow DOM via :host. */
      code-gloss {
        --cg-bg: rgb(255, 0, 0);
        --cg-text: rgb(0, 255, 0);
        --cg-ann-border: rgb(0, 0, 255);
      }
    </style>
    <script type="module" src="/codegloss/index.js"></script>
  </head>
  <body>
    <main>
      <h1>themed</h1>
      <code-gloss>
        <script type="application/json">
{
  "code": "let x = 1;",
  "lang": "js",
  "filename": "themed.js",
  "annotations": [
    {
      "id": "a1",
      "token": "x",
      "line": 0,
      "occurrence": 0,
      "title": "X",
      "text": "Just a variable."
    }
  ]
}
        </script>
      </code-gloss>
    </main>
  </body>
</html>
