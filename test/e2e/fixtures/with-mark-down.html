<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>codegloss e2e · interop with &lt;mark-down&gt;</title>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>
		<!-- Two unrelated Web Components on the same page. mark-down is a
         zero-dependency vanilla JS WC that renders inline markdown. If
         <code-gloss> plays nicely with it, it'll play nicely with anything. -->
		<script
			defer
			src="/vendor/mark-down.js"
		></script>
		<script
			type="module"
			src="/codegloss/index.js"
		></script>
	</head>
	<body>
		<main>
			<h1>interop with &lt;mark-down&gt;</h1>

			<mark-down>
				# Hello from mark-down This paragraph is rendered by the mark-down
				element. It lives in its own shadow root, so its styles cannot leak into
				the codegloss element next to it. - bullet one - bullet two
			</mark-down>

			<code-gloss>
				<script type="application/json">
					{
						"code": "function fib(n) {\n  return n < 2 ? n : fib(n - 1) + fib(n - 2);\n}",
						"lang": "js",
						"filename": "fib.js",
						"annotations": [
							{
								"id": "a1",
								"token": "fib",
								"line": 0,
								"occurrence": 0,
								"title": "Recursion",
								"text": "Calls itself with smaller inputs."
							}
						]
					}
				</script>
			</code-gloss>
		</main>
	</body>
</html>
